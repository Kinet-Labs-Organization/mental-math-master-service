services:
  dev-api-mmm:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:123@dev-db-mmm:5432/dev_db_mmm
      DIRECT_URL: postgresql://postgres:123@dev-db-mmm:5432/dev_db_mmm
      REDIS_HOST: dev-cache-mmm
      REDIS_PORT: 6379
    ports:
      - 3001:3001
    depends_on:
      dev-db-mmm:
        condition: service_healthy
      dev-cache-mmm:
        condition: service_healthy
    networks:
      - mmm-network

  dev-db-mmm:
    image: postgres:15
    restart: always
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: dev_db_mmm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mmm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev_db_mmm"]
      interval: 10s
      timeout: 5s
      retries: 5

  dev-cache-mmm:
    image: redis:7-alpine
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis_dev_data:/data
    networks:
      - mmm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  test-db-mmm:
    image: postgres:15
    restart: always
    ports:
      - 5435:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: test_db_mmm
    networks:
      - mmm-network

  test-cache-mmm:
    image: redis:7-alpine
    restart: always
    ports:
      - 6380:6379
    networks:
      - mmm-network

  bullmq-dashboard-mmm:
    image: venatum/bull-board:latest
    restart: always
    depends_on:
      dev-cache-mmm:
        condition: service_healthy
    environment:
      REDIS_HOST: dev-cache-mmm
      REDIS_PORT: 6379
      BULL_VERSION: BULLMQ
      BULL_PREFIX: bull
    ports:
      - 3002:3000
    networks:
      - mmm-network

# ↓ This was missing — declares the network so all services can use it
networks:
  mmm-network:
    driver: bridge

volumes:
  postgres_data:
  redis_dev_data:
